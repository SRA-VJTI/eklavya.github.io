<header class="site-nav">
  <button class="nav-hamburger" id="nav-hamburger" aria-label="Menu">
    <span></span>
    <span></span>
    <span></span>
  </button>
  <nav id="nav-menu">
    <a href="{{ '/' | relative_url }}" class="nav-link{% if page.permalink == '/' %} active{% endif %}">Home</a>
    <a href="{{ '/eklavya25/' | relative_url }}" class="nav-link{% if page.url contains 'eklavya25' %} active{% endif %}">Eklavya '25</a>
    <a href="{{ '/leaderboard/' | relative_url }}" class="nav-link{% if page.url contains 'leaderboard' %} active{% endif %}">Leaderboard</a>
    <a href="{{ '/tasks/' | relative_url }}" class="nav-link{% if page.url contains 'tasks' %} active{% endif %}">Tasks</a>
    <a href="{{ '/projects/' | relative_url }}" class="nav-link{% if page.url contains 'projects' %} active{% endif %}">Projects</a>
  </nav>
</header>

<script>
  (function () {
    var btn = document.getElementById('nav-hamburger');
    var menu = document.getElementById('nav-menu');
    btn.addEventListener('click', function () {
      menu.classList.toggle('open');
      btn.classList.toggle('open');
    });
    menu.querySelectorAll('.nav-link').forEach(function (l) {
      l.addEventListener('click', function () {
        menu.classList.remove('open');
        btn.classList.remove('open');
      });
    });
  })();
</script>

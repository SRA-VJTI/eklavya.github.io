    <!-- Vesper Libre (Hinglish style) -->

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Vesper+Libre:wght@400;700&amp;display=swap">

    <!-- Styles -->

</head>
<body>
  <header class="site-nav">
  <button class="nav-hamburger" id="nav-hamburger" aria-label="Menu">
    <span></span>
    <span></span>
    <span></span>
  </button>
  <nav id="nav-menu">
    <a href="/" class="nav-link">Home</a>
    <a href="/eklavya25/" class="nav-link">Eklavya '25</a>
    <a href="/leaderboard/" class="nav-link">Leaderboard</a>
<a href="/tasks/" class="nav-link">Tasks</a>
    <a href="/projects/" class="nav-link">Projects</a>
  </nav>
</header>

<script>
  (function () {
    var btn = document.getElementById('nav-hamburger');
    var menu = document.getElementById('nav-menu');
    btn.addEventListener('click', function () {
      menu.classList.toggle('open');
      btn.classList.toggle('open');
    });
    menu.querySelectorAll('.nav-link').forEach(function (l) {
      l.addEventListener('click', function () {
        menu.classList.remove('open');
        btn.classList.remove('open');
      });
    });
  })();
</script>

  <main>
    <div class="page-hero">
  <h1 class="page-title">Page not found</h1>
</div>

<div class="page-content">
  <p>You will be redirected to the main page within 3 seconds. If not redirected, please go back to the <a href="/">home page</a>.</p>

</div>

  </main>

  <script>
    (function () {
      var nav   = document.querySelector('.site-nav');
      var links = nav.querySelectorAll('.nav-link');

      function update() {
        var vh       = window.innerHeight;
        var start    = vh * 0.65;
        var end      = vh * 1.05;
        var progress = Math.min(Math.max((window.scrollY - start) / (end - start), 0), 1);

        // background: dark → light
        var bgDark  = [13, 13, 13];
        var bgLight = [255, 255, 255];
        var r = Math.round(bgDark[0] + (bgLight[0] - bgDark[0]) * progress);
        var g = Math.round(bgDark[1] + (bgLight[1] - bgDark[1]) * progress);
        var b = Math.round(bgDark[2] + (bgLight[2] - bgDark[2]) * progress);
        nav.style.background = 'rgba(' + r + ',' + g + ',' + b + ', 0.88)';
        nav.style.borderBottomColor = 'rgba(0,0,0,' + (progress * 0.08) + ')';

        // links: dim white → dim black
        var linkOpacity = 0.45 + (progress * (0.45 - 0.45)); // stays at 0.45 opacity
        var lr = Math.round(240 + (13 - 240) * progress);
        var lg = Math.round(240 + (13 - 240) * progress);
        var lb = Math.round(240 + (13 - 240) * progress);
        links.forEach(function(l) {
          l.style.color = 'rgba(' + lr + ',' + lg + ',' + lb + ', 0.55)';
        });
      }

      window.addEventListener('scroll', update, { passive: true });
      update();
    })();
  </script>
</body>
</html>

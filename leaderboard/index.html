  <style>
.leaderboard-container {
  max-width: 700px;
  margin: 2rem auto;
  padding: 2rem 1rem;
  background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS98rRUNTTHddzwYQ0b9iB5NMkjAxGMEXPWxDrufYGEsnPk7aTrvvwppHg&s=10');
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  border-radius: 12px;
  position: relative;
}

.leaderboard-container::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-color: rgba(255, 255, 255, 0.80);
  border-radius: 12px;
  z-index: 0;
}

.leaderboard-container > * {
  position: relative;
  z-index: 1;
}

.leaderboard-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 1.5rem;
}

.leaderboard-table thead {
  background-color: transparent;
}

.leaderboard-table th {
  padding: 1.2rem;
  text-align: left;
  font-weight: 700;
  color: black;
  border: 2px solid #000000;
  font-size: 1.1rem;
}

.leaderboard-table tbody th {
  color: black;
}

.leaderboard-table tbody th.top-rank {
  font-weight: 900;
}

.leaderboard-table tbody tr {
  border: 2px solid #000000;
}

.leaderboard-table td {
  padding: 1rem 1.2rem;
  text-align: left;
  border: 2px solid #000000;
}

.leaderboard-table tbody td:nth-child(2) {
  font-weight: 600;
  font-size: 1.05rem;
  letter-spacing: 0.3px;
  color: #1a1a1a;
}

.leaderboard-table tbody tr:hover {
  background-color: #f0f0f0;
}
</style>

<div class="leaderboard-container">
  <table class="leaderboard-table">
    <thead>
      <tr>
        <th scope="col">Rank</th>
        <th scope="col">Team</th>
        <th scope="col">Points</th>
      </tr>
    </thead>
    <tbody id="leaderboardBody">
      <tr>
        <td colspan="3" style="text-align: center; padding: 2rem;">Loading leaderboard...</td>

  </main>

  <script>
    (function () {
      var nav   = document.querySelector('.site-nav');
      var links = nav.querySelectorAll('.nav-link');

      function update() {
        var vh       = window.innerHeight;
        var start    = vh * 0.65;
        var end      = vh * 1.05;
        var progress = Math.min(Math.max((window.scrollY - start) / (end - start), 0), 1);

        // background: dark → light
        var bgDark  = [13, 13, 13];
        var bgLight = [255, 255, 255];
        var r = Math.round(bgDark[0] + (bgLight[0] - bgDark[0]) * progress);
        var g = Math.round(bgDark[1] + (bgLight[1] - bgDark[1]) * progress);
        var b = Math.round(bgDark[2] + (bgLight[2] - bgDark[2]) * progress);
        nav.style.background = 'rgba(' + r + ',' + g + ',' + b + ', 0.88)';
        nav.style.borderBottomColor = 'rgba(0,0,0,' + (progress * 0.08) + ')';

        // links: dim white → dim black
        var linkOpacity = 0.45 + (progress * (0.45 - 0.45)); // stays at 0.45 opacity
        var lr = Math.round(240 + (13 - 240) * progress);
        var lg = Math.round(240 + (13 - 240) * progress);
        var lb = Math.round(240 + (13 - 240) * progress);
        links.forEach(function(l) {
          l.style.color = 'rgba(' + lr + ',' + lg + ',' + lb + ', 0.55)';
        });
      }

      window.addEventListener('scroll', update, { passive: true });
      update();
    })();
  </script>
